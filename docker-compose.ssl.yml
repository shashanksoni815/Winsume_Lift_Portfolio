# Optional overlay (second -f) for Docker Compose v2 only.
# Main repo default is docker-compose.yml (already includes HTTPS).
# Do NOT merge this with docker-compose 1.29 — use single docker-compose.yml instead.

version: "3.8"

services:
  nginx:
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot

volumes:
  certbot_www:
