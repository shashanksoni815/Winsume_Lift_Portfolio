# Full stack: Nginx (80) → frontend (SPA) + backend (API + uploads)
# Usage: copy .env.example → .env, then:  docker compose up --build

name: winsume-lift

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "5000"
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - winsume

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        REACT_APP_API_URL: /api
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - winsume

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - winsume

networks:
  winsume:
    driver: bridge

volumes:
  backend_uploads:
