# Full stack: Nginx → frontend + backend + Mongo (Docker)
# HTTPS: needs Let's Encrypt on host: /etc/letsencrypt/live/winsumelift.com/
#   docker compose stop nginx && certbot certonly --standalone -d your.domain ...
# HTTP-only (no certs): remove nginx "443:443" and the three nginx volumes below (uses image default.conf).
#
# Run: docker compose up --build -d  (Compose v2; legacy docker-compose 1.29 breaks on Docker 25+)

version: "3.8"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - winsume
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/winsume}
      JWT_SECRET: ${JWT_SECRET:-winsume-docker-default-jwt-secret-min-32-chars-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-winsume-docker-default-refresh-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      - mongo
    networks:
      - winsume

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        REACT_APP_API_URL: /api
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - winsume

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    networks:
      - winsume

networks:
  winsume:
    driver: bridge

volumes:
  backend_uploads:
  mongo_data:
  certbot_www:
