# Full stack: Nginx (80) → frontend (SPA) + backend (API + uploads)
# Run from this folder:  docker-compose up --build -d
# (Works with docker-compose v1.x; for v2 use: docker compose up --build -d)
# Optional .env here overrides MONGODB_URI / JWT_* (Atlas, strong secrets).

version: "3.8"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - winsume
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "5000"
      # Defaults work without .env (Mongo in Docker). Override via .env for Atlas / production JWT.
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/winsume}
      JWT_SECRET: ${JWT_SECRET:-winsume-docker-default-jwt-secret-min-32-chars-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-winsume-docker-default-refresh-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      - mongo
    networks:
      - winsume

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        REACT_APP_API_URL: /api
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - winsume

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - winsume

networks:
  winsume:
    driver: bridge

volumes:
  backend_uploads:
  mongo_data:
