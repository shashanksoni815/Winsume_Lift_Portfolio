# HTTPS + HTTP ACME (Let's Encrypt)
# Prerequisites: certs at /etc/letsencrypt/live/winsumelift.com/ (see DOCKER.md SSL section)
# Port 80: only ACME challenge + redirect to HTTPS
# Port 443: same proxy as HTTP stack

upstream winsume_frontend {
    server frontend:80;
}

upstream winsume_backend {
    server backend:5000;
}

# HTTP — Let's Encrypt challenge + redirect rest to HTTPS
server {
    listen 80;
    server_name winsumelift.com www.winsumelift.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — app
server {
    listen 443 ssl http2;
    server_name winsumelift.com www.winsumelift.com;

    ssl_certificate     /etc/letsencrypt/live/winsumelift.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/winsumelift.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 15m;

    location /api {
        proxy_pass http://winsume_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    location /uploads {
        proxy_pass http://winsume_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://winsume_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://winsume_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
