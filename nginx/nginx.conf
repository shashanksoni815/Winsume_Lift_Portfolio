# Edge reverse proxy — HTTP on port 80 for winsumelift.com
# SSL: add a second server { listen 443 ssl http2; ... } and cert paths when ready.

upstream winsume_frontend {
    server frontend:80;
}

upstream winsume_backend {
    server backend:5000;
}

server {
    listen 80;
    server_name winsumelift.com www.winsumelift.com;

    client_max_body_size 15m;

    # API (Express mounts everything under /api)
    location /api {
        proxy_pass http://winsume_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # Product images etc. (Express static /uploads)
    location /uploads {
        proxy_pass http://winsume_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://winsume_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # React SPA (static nginx in frontend service)
    location / {
        proxy_pass http://winsume_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
